<!DOCTYPE html>
<html>
<body>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
<script>
var py = null;

loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.1/full/" }).then(function(p) {
  py = p;
  // Redirect stdout/stderr using Python's sys module — most reliable method
  py.runPython([
    "import sys, io",
    "class _Cap:",
    "    def __init__(self): self.buf=[]",
    "    def write(self,s): self.buf.append(s)",
    "    def flush(self): pass",
    "    def getvalue(self): return ''.join(self.buf)",
    "_stdout_cap = _Cap()",
    "_stderr_cap = _Cap()"
  ].join("\n"));
  parent.postMessage({ type: "py_ready" }, "*");
});

window.addEventListener("message", async function(e) {
  if (!e.data || e.data.t !== "run") return;
  if (!py) {
    parent.postMessage({ id: e.data.id, ok: false, error: "Pyodide not ready" }, "*");
    return;
  }

  var ec = 0;

  // Reset capture buffers and redirect sys.stdout/stderr
  py.runPython([
    "import sys",
    "_stdout_cap.buf = []",
    "_stderr_cap.buf = []",
    "sys.stdout = _stdout_cap",
    "sys.stderr = _stderr_cap"
  ].join("\n"));

  // Setup stdin
  var lines = (e.data.stdin || "").split("\n");
  py.globals.set("_sl", py.toPy(lines));
  try {
    py.runPython([
      "import builtins",
      "_sl = list(_sl)",
      "_si = [0]",
      "def _inp(p=''):",
      "    i = _si[0]; _si[0] += 1",
      "    return _sl[i] if i < len(_sl) else ''",
      "builtins.input = _inp"
    ].join("\n"));
  } catch(x) {}

  // Run user code
  try {
    await py.runPythonAsync(e.data.code);
  } catch(x) {
    py.runPython("sys.stderr.write(" + JSON.stringify(x.message || String(x)) + ")");
    ec = 1;
  }

  // Restore sys and collect output
  var o = py.runPython("_stdout_cap.getvalue()");
  var er = py.runPython("_stderr_cap.getvalue()");
  py.runPython("sys.stdout = sys.__stdout__; sys.stderr = sys.__stderr__");

  parent.postMessage({ id: e.data.id, ok: true, stdout: o, stderr: er, ec: ec }, "*");
});
</script>
</body>
</html>
